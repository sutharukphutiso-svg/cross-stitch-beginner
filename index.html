<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cross Stitch Pattern Maker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f6f0;--panel:#ffffff;--border:#e0d8cc;--border2:#c8bfb0;
  --accent:#2a1f0e;--gold:#8b6914;--gold2:#c4981f;
  --btn:#2a1f0e;--btn-t:#ffffff;
  --red:#c0392b;--green:#27ae60;
  --text:#1a1208;--muted:#7a6e5e;--light:#f0ebe0;
}
body{font-family:'Segoe UI',sans-serif;font-size:13px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOOLBAR ── */
#toolbar{background:var(--accent);color:#fff;padding:0 12px;height:40px;display:flex;align-items:center;gap:6px;flex-shrink:0;user-select:none}
#toolbar h1{font-size:13px;font-weight:600;letter-spacing:.5px;margin-right:8px;opacity:.9}
.tb{padding:4px 10px;font-size:11px;border:1px solid rgba(255,255,255,.25);border-radius:4px;background:transparent;color:#fff;cursor:pointer;white-space:nowrap;transition:background .12s}
.tb:hover{background:rgba(255,255,255,.15)}
.tb.act{background:var(--gold2);border-color:var(--gold2);font-weight:600}
.tb.gr{background:#27ae60;border-color:#27ae60}
.tb.gr:hover{background:#2ecc71}
.tb.rd{background:#c0392b;border-color:#c0392b}
.sep{width:1px;height:24px;background:rgba(255,255,255,.2);margin:0 2px}
#zoom-label{font-size:11px;min-width:42px;text-align:center;opacity:.8}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#left{width:220px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:10px}
#left::-webkit-scrollbar{width:4px}
#left::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sec{margin-bottom:12px}
.sec-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:5px;border-bottom:1px solid var(--border);padding-bottom:3px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:11px}
.row label{color:var(--muted);flex-shrink:0}
.row b{font-weight:600;min-width:28px;text-align:right}
input[type=range]{flex:1;margin:0 6px;height:3px;-webkit-appearance:none;background:var(--border2);border-radius:2px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold2);border:2px solid var(--panel)}
select,input[type=text]{width:100%;padding:4px 6px;border:1px solid var(--border2);border-radius:4px;font-size:11px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;margin-bottom:4px}
select:focus,input[type=text]:focus{border-color:var(--gold2)}
.cb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-bottom:3px;cursor:pointer}
input[type=checkbox]{accent-color:var(--gold2);width:12px;height:12px}

/* UPLOAD */
#dz{border:2px dashed var(--border2);border-radius:6px;padding:14px 8px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px;line-height:1.7;transition:all .15s}
#dz:hover,#dz.ov{border-color:var(--gold2);background:rgba(196,152,31,.05);color:var(--gold)}
#dz .ico{font-size:24px;margin-bottom:2px}
#thumb{width:100%;border-radius:4px;margin-top:6px;display:none;border:1px solid var(--border);max-height:110px;object-fit:contain}
#badge{display:none;font-size:10px;text-align:center;padding:3px 6px;border-radius:4px;margin-top:4px}
#badge.ok{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
#badge.err{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a}
#badge.run{background:#fff8e1;color:#6d4c00;border:1px solid #ffe082}

/* BUTTONS */
.btn{display:block;width:100%;padding:6px 10px;font-size:11px;font-family:inherit;border:1px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);cursor:pointer;margin-bottom:3px;text-align:center;transition:all .12s}
.btn:hover{background:var(--light);border-color:var(--border2)}
.btn.primary{background:var(--btn);color:var(--btn-t);border-color:var(--btn);font-weight:600}
.btn.primary:hover{background:#3d2e18}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.success:hover{background:#2ecc71}
.hint{font-size:10px;color:var(--gold);background:#fffbea;border:1px solid #f0d060;border-radius:4px;padding:4px 6px;margin-bottom:4px;line-height:1.5;display:none}

/* PALETTE */
#pal-grid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.sw{width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.sw:hover{transform:scale(1.15)}
.sw.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--gold2)}

/* DMC LIST */
#dmc-list{max-height:200px;overflow-y:auto;font-size:10px}
#dmc-list::-webkit-scrollbar{width:3px}
#dmc-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.dmc-row{display:flex;align-items:center;gap:4px;padding:3px 2px;border-bottom:1px solid var(--border);border-radius:3px}
.dmc-row:hover{background:var(--light)}
.dmc-dot{width:13px;height:13px;border-radius:2px;border:1px solid rgba(0,0,0,.15);flex-shrink:0}
.dmc-num{font-weight:600;color:var(--text);flex-shrink:0;min-width:40px}
.dmc-name{color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dmc-cnt{color:var(--muted);flex-shrink:0}

/* ── CANVAS AREA ── */
#canvas-area{flex:1;position:relative;overflow:hidden;background:#e8e4dc;display:flex;align-items:center;justify-content:center;cursor:crosshair}
#gc{position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}

/* ── STATUS BAR ── */
#statusbar{height:24px;background:var(--accent);color:rgba(255,255,255,.7);font-size:10px;display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
#statusbar span b{color:#fff}

/* ── RIGHT PANEL ── */
#right{width:160px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:8px}
#ref-side{width:380px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#right::-webkit-scrollbar{width:4px}
#right::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* REF PANEL */
#ref-cv{cursor:crosshair}
#ref-cv.ref-picking{cursor:crosshair;outline:2px solid var(--gold2)}
#ref-pick-btn.active{background:var(--gold2);color:#000;border-color:var(--gold2)}

/* PROGRESS */
#prog-wrap{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid var(--border2);border-radius:8px;padding:18px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15);min-width:180px;z-index:10}
#prog-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
#prog-fill{height:100%;background:var(--gold2);border-radius:2px;width:0;transition:width .3s}
#prog-txt{font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <h1>✦ Cross Stitch</h1>
  <button class="tb act" id="t-move" onclick="setTool('move',this)">✋ Move</button>
  <button class="tb" id="t-paint" onclick="setTool('paint',this)">✏️ Paint</button>
  <button class="tb" id="t-erase" onclick="setTool('erase',this)">⬜ Erase</button>
  <button class="tb" id="t-fill" onclick="setTool('fill',this)">🪣 Fill</button>
  <button class="tb" id="t-pick" onclick="setTool('pick',this)">💉 Pick</button>
  <div class="sep"></div>
  <button class="tb" onclick="doZoom(1.2)">＋</button>
  <div id="zoom-label">100%</div>
  <button class="tb" onclick="doZoom(1/1.2)">－</button>
  <button class="tb" onclick="fitZoom()">Fit</button>
  <div class="sep"></div>
  <button class="tb" onclick="undo()">↩ Undo</button>
  <button class="tb rd" onclick="clearAll()">✕ Clear</button>
</div>

<div id="main">

<!-- LEFT PANEL -->
<div id="left">

  <div class="sec">
    <div class="sec-h">ภาพต้นฉบับ</div>
    <div id="dz" onclick="document.getElementById('fi').click()" ondragover="event.preventDefault();this.classList.add('ov')" ondragleave="this.classList.remove('ov')" ondrop="dzDrop(event)">
      <div class="ico">🖼</div>
      คลิกหรือลากภาพมาวาง<br>
      <span style="font-size:10px;opacity:.6">PNG / JPG</span>
    </div>
    <img id="thumb">
    <div id="badge"></div>
    <input type="file" id="fi" accept="image/*" style="display:none" onchange="loadImg(this)">
  </div>

  <div class="sec">
    <div class="sec-h">ขนาด Grid</div>
    <div class="row"><label>กว้าง</label><input type="range" id="sW" min="10" max="150" value="40" oninput="syncW()"><b id="vW">40</b></div>
    <div class="row"><label>สูง</label><input type="range" id="sH" min="10" max="150" value="40" oninput="syncH()"><b id="vH">40</b></div>
    <div class="cb"><input type="checkbox" id="lockAR" checked><label for="lockAR">ล็อกสัดส่วน</label></div>
    <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px">
      <button class="btn" style="flex:1;padding:4px" onclick="setSize(30,30)">30²</button>
      <button class="btn" style="flex:1;padding:4px" onclick="setSize(40,40)">40²</button>
      <button class="btn" style="flex:1;padding:4px" onclick="setSize(60,60)">60²</button>
      <button class="btn" style="flex:1;padding:4px" onclick="setSize(80,80)">80²</button>
    </div>
    <button class="btn primary" onclick="autoSize()">🎯 Auto ขนาด</button>
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
      <label style="font-size:10px;color:var(--muted);white-space:nowrap">Block px:</label>
      <input type="number" id="manualBlock" min="1" max="100" placeholder="เช่น 10" style="width:60px;padding:3px 5px;border:1px solid var(--border2);border-radius:4px;font-size:11px;background:var(--bg);color:var(--text)">
      <button class="btn" style="flex:1;padding:3px 6px;font-size:10px" onclick="applyManualBlock()">Apply</button>
    </div>
    <div class="hint" id="size-hint"></div>
  </div>

  <div class="sec">
    <div class="sec-h">สี</div>
    <div class="row"><label>จำนวนสี</label><input type="range" id="sNC" min="2" max="40" value="12" oninput="document.getElementById('vNC').textContent=this.value"><b id="vNC">12</b></div>
    <div style="display:flex;gap:3px;margin-bottom:4px">
      <button class="btn" style="flex:1;padding:4px" onclick="setNC(6)">6</button>
      <button class="btn" style="flex:1;padding:4px" onclick="setNC(10)">10</button>
      <button class="btn" style="flex:1;padding:4px" onclick="setNC(16)">16</button>
      <button class="btn" style="flex:1;padding:4px" onclick="setNC(24)">24</button>
    </div>
    <button class="btn primary" onclick="autoColors()">🎨 Auto สี</button>
    <div class="hint" id="color-hint"></div>
  </div>

  <div class="sec">
    <div class="sec-h">ตัวเลือก</div>
    <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">พื้นหลัง</label>
    <select id="bgMode">
      <option value="white">⬜ ขาว / PNG โปร่งใส</option>
      <option value="black">⬛ ดำ</option>
      <option value="none">✕ ไม่ลบ</option>
    </select>
    <div class="cb"><input type="checkbox" id="chkNoise"><label for="chkNoise">กรอง noise รอบนอก (เฉพาะภาพที่ไม่มี decoration)</label></div>
    <div class="cb"><input type="checkbox" id="chkGrid" checked onchange="render()"><label for="chkGrid">แสดง grid</label></div>
    <div class="cb"><input type="checkbox" id="chkSym" checked onchange="render()"><label for="chkSym">แสดง symbol</label></div>
  </div>

  <div class="sec">
    <div class="sec-h">ผ้า</div>
    <select id="fab" onchange="updStatus()">
      <option value="11">Aida 11 ct</option>
      <option value="14" selected>Aida 14 ct</option>
      <option value="16">Aida 16 ct</option>
      <option value="18">Aida 18 ct</option>
    </select>
    <div id="fab-size" style="font-size:10px;color:var(--gold)">-- × -- cm</div>
  </div>

  <button class="btn primary" style="font-size:13px;padding:8px" onclick="doConvert()">✦ แปลงเป็น Pattern</button>

  <div class="sec" style="margin-top:10px">
    <div class="sec-h">Export</div>
    <button class="btn success" onclick="exportPNG()">📥 PNG Pattern</button>
    <button class="btn success" style="background:#2980b9;border-color:#2980b9" onclick="exportPatternKeeper()">📖 Pattern Keeper</button>
    <button class="btn" onclick="exportChart()">📋 Chart + Symbols</button>
    <button class="btn" onclick="exportFlossList()">🧵 Floss List</button>
  </div>

</div><!-- /left -->

<!-- CANVAS -->
<div id="canvas-area">
  <canvas id="gc"></canvas>
  <div id="prog-wrap">
    <div id="prog-txt">กำลังแปลง...</div>
    <div id="prog-bar"><div id="prog-fill"></div></div>
  </div>
</div>

<!-- REF SIDE PANEL -->
<div id="ref-side">
  <div style="padding:8px 10px 6px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold)">ภาพต้นฉบับ</span>
    <div style="display:flex;gap:3px">
      <button class="btn" style="padding:2px 7px;font-size:11px" onclick="refZoom(1.5)">＋</button>
      <button class="btn" style="padding:2px 7px;font-size:11px" onclick="refZoom(1/1.5)">－</button>
      <button class="btn" style="padding:2px 7px;font-size:11px" onclick="refFit()">Fit</button>
      <button class="btn" id="ref-pick-btn" style="padding:2px 7px;font-size:11px" onclick="toggleRefPick()">💉</button>
    </div>
  </div>
  <div style="flex:1;position:relative;overflow:hidden;background:#e8e4dc;cursor:crosshair" id="ref-wrap">
    <canvas id="ref-cv" style="position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges"></canvas>
    <div id="ref-empty" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:11px;color:var(--muted)">อัปโหลดภาพ<br>เพื่อดูที่นี่</div>
  </div>
  <div id="ref-color-preview" style="flex-shrink:0;padding:5px 8px;border-top:1px solid var(--border);font-size:10px;display:flex;align-items:center;gap:6px;min-height:28px">
    <div id="ref-color-dot" style="width:14px;height:14px;border-radius:2px;border:1px solid var(--border2);flex-shrink:0"></div>
    <span id="ref-color-txt" style="color:var(--muted)">💉 คลิกภาพเพื่อดูดสี</span>
  </div>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <div class="sec-h" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px">Palette</div>
  <div id="pal-grid"></div>
  <div style="display:flex;gap:3px;margin-bottom:8px">
    <button class="btn" style="flex:1;padding:3px;font-size:10px" onclick="addColor()">+ สี</button>
    <button class="btn" style="flex:1;padding:3px;font-size:10px;color:var(--red)" onclick="removeUnused()">ลบที่ไม่ใช้</button>
  </div>
  <div class="sec-h" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:3px">DMC Thread</div>
  <div id="dmc-list"></div>
</div>

</div><!-- /main -->

<div id="statusbar">
  <span>Grid: <b id="st-grid">--</b></span>
  <span>Zoom: <b id="st-zoom">100%</b></span>
  <span>XY: <b id="st-xy">--</b></span>
  <span>Size: <b id="st-cm">-- cm</b></span>
  <span>Tool: <b id="st-tool">Move</b></span>
</div>

<canvas id="ref-canvas" style="display:none"></canvas>

// ═══════════════ HELPERS ═══════════════
function h2r(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var v=parseInt(h,16);return isNaN(v)?null:[(v>>16)&255,(v>>8)&255,v&255];}
function r2h(r,g,b){return'#'+(('000000'+((r<<16)|(g<<8)|b).toString(16)).slice(-6));}
var dmcCache={};
function nearDMC(hex){
  if(dmcCache[hex])return dmcCache[hex];
  var rgb=h2r(hex);if(!rgb)return{num:'--',name:'?',hex:hex};
  var best=0,bd=1e18;
  for(var i=0;i<DMC.length;i++){
    var d=DMC[i],r2=d[1],g2=d[2],b2=d[3];
    if(typeof r2!=='number')continue;
    var mr=(rgb[0]+r2)/2,dr=rgb[0]-r2,dg=rgb[1]-g2,db=rgb[2]-b2;
    var dist=(2+mr/256)*dr*dr+4*dg*dg+(2+(255-mr)/256)*db*db;
    if(dist<bd){bd=dist;best=i;}
  }
  var res={num:DMC[best][0],name:DMC[best][4],hex:r2h(DMC[best][1],DMC[best][2],DMC[best][3])};
  dmcCache[hex]=res;return res;
}
function getSym(i){return i>=0&&i<SYM.length?SYM[i]:'?';}
function inB(c,r){return c>=0&&c<COLS&&r>=0&&r<ROWS;}
function getCell(e){
  var rc=gc.getBoundingClientRect(),ds=CELL*ZL;
  return[Math.floor((e.clientX-rc.left)/ds+VX),Math.floor((e.clientY-rc.top)/ds+VY)];
}
function colorDist(r1,g1,b1,r2,g2,b2){
  var mr=(r1+r2)/2,dr=r1-r2,dg=g1-g2,db=b1-b2;
  return(2+mr/256)*dr*dr+4*dg*dg+(2+(255-mr)/256)*db*db;
}

// ═══════════════ RENDER ═══════════════
function render(){
  var W=area.offsetWidth,H=area.offsetHeight;
  if(gc.width!==W||gc.height!==H){gc.width=W;gc.height=H;}
  var ds=CELL*ZL,sg=document.getElementById('chkGrid').checked,ss=document.getElementById('chkSym').checked;
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var px=Math.round((c-VX)*ds),py=Math.round((r-VY)*ds);
      if(px+ds<0||py+ds<0||px>W||py>H)continue;
      var ci=grid[r][c];
      if(ci>=0&&ci<palette.length){
        ctx.fillStyle=palette[ci];ctx.fillRect(px,py,Math.ceil(ds),Math.ceil(ds));
        if(ss&&ds>=10){
          var rgb=h2r(palette[ci]),lum=rgb?0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2]:128;
          ctx.fillStyle=lum>145?'rgba(0,0,0,.6)':'rgba(255,255,255,.85)';
          ctx.font='bold '+Math.max(6,Math.min(ds-4,12))+'px monospace';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(getSym(ci),px+ds/2,py+ds/2);
        }
      }
      if(sg&&ds>=3){
        ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.5;
        ctx.strokeRect(px+.5,py+.5,Math.ceil(ds)-1,Math.ceil(ds)-1);
      }
    }
  }
  if(sg&&ds>=3){
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=.8;
    for(var r2=0;r2<=ROWS;r2+=10){var py2=Math.round((r2-VY)*ds);ctx.beginPath();ctx.moveTo(0,py2);ctx.lineTo(W,py2);ctx.stroke();}
    for(var c2=0;c2<=COLS;c2+=10){var px2=Math.round((c2-VX)*ds);ctx.beginPath();ctx.moveTo(px2,0);ctx.lineTo(px2,H);ctx.stroke();}
  }
  updStatus();
}
function updStatus(){
  var ct=parseInt(document.getElementById('fab').value)||14;
  var wc=(COLS/ct*2.54).toFixed(1),hc=(ROWS/ct*2.54).toFixed(1);
  document.getElementById('st-grid').textContent=COLS+'×'+ROWS;
  document.getElementById('st-zoom').textContent=Math.round(ZL*100)+'%';
  document.getElementById('zoom-label').textContent=Math.round(ZL*100)+'%';
  document.getElementById('st-cm').textContent=wc+'×'+hc+' cm';
  document.getElementById('fab-size').textContent=wc+' × '+hc+' cm';
}
function fitZoom(){
  VX=0;VY=0;
  var aw=area.offsetWidth||800,ah=area.offsetHeight||500;
  ZL=Math.min(aw/(COLS*CELL)*.95,ah/(ROWS*CELL)*.95);
  render();
}
function doZoom(f){ZL=Math.max(.05,Math.min(20,ZL*f));render();}

// ═══════════════ TOOLS ═══════════════
function setTool(t,btn){
  tool=t;
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  var cursors={move:'grab',paint:'crosshair',erase:'cell',fill:'crosshair',pick:'crosshair'};
  area.style.cursor=cursors[t]||'crosshair';
  document.getElementById('st-tool').textContent=btn.textContent.trim();
}
function paintCell(c,r){
  if(!inB(c,r))return false;
  if(tool==='erase'){if(grid[r][c]===-1)return false;grid[r][c]=-1;return true;}
  if(tool==='paint'){if(SI<0||SI>=palette.length||grid[r][c]===SI)return false;grid[r][c]=SI;return true;}
  return false;
}
function flood(c,r,from,to){
  if(from===to||to<0)return;
  var stk=[[c,r]];
  while(stk.length){var p=stk.pop(),cc=p[0],rr=p[1];if(!inB(cc,rr)||grid[rr][cc]!==from)continue;grid[rr][cc]=to;stk.push([cc+1,rr],[cc-1,rr],[cc,rr+1],[cc,rr-1]);}
}

// ═══════════════ HISTORY ═══════════════
function pushH(){hist.push(grid.map(function(r){return r.slice();}));if(hist.length>40)hist.shift();}
function undo(){if(!hist.length)return;grid=hist.pop();updPal();render();}
function clearAll(){pushH();grid=Array.from({length:ROWS},function(){return new Array(COLS).fill(-1);});updPal();render();}

// ═══════════════ EVENTS ═══════════════
function initEvents(){
  area.addEventListener('wheel',function(e){
    e.preventDefault();
    var rc=gc.getBoundingClientRect(),ds=CELL*ZL;
    var cx=(e.clientX-rc.left)/ds+VX,cy=(e.clientY-rc.top)/ds+VY;
    ZL=Math.max(.05,Math.min(20,ZL*(e.deltaY<0?1.15:.87)));
    var ds2=CELL*ZL;VX=cx-(e.clientX-rc.left)/ds2;VY=cy-(e.clientY-rc.top)/ds2;
    render();
  },{passive:false});
  area.addEventListener('mousedown',function(e){
    var p=getCell(e),c=p[0],r=p[1];
    if(tool==='move'){painting=true;area.style.cursor='grabbing';panStart={x:e.clientX,y:e.clientY,vx:VX,vy:VY};return;}
    if(tool==='pick'){if(inB(c,r)&&grid[r][c]>=0){SI=grid[r][c];updPal();}return;}
    if(tool==='fill'){if(!inB(c,r))return;pushH();flood(c,r,grid[r][c],SI);updPal();render();return;}
    pushH();painting=true;paintCell(c,r);render();
  });
  area.addEventListener('mousemove',function(e){
    var p=getCell(e),c=p[0],r=p[1];
    document.getElementById('st-xy').textContent=inB(c,r)?(c+1)+','+(r+1):'--';
    if(tool==='move'&&painting&&panStart){
      var ds=CELL*ZL;VX=panStart.vx-(e.clientX-panStart.x)/ds;VY=panStart.vy-(e.clientY-panStart.y)/ds;render();return;
    }
    if(painting&&(tool==='paint'||tool==='erase')){paintCell(c,r);render();}
  });
  area.addEventListener('mouseup',function(){
    if(tool==='move')area.style.cursor='grab';
    painting=false;if(tool==='paint'||tool==='erase')updPal();
  });
  area.addEventListener('mouseleave',function(){painting=false;document.getElementById('st-xy').textContent='--';});
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
    var km={m:'move',p:'paint',e:'erase',f:'fill',k:'pick'};
    if(km[e.key.toLowerCase()]){var b=document.getElementById('t-'+km[e.key.toLowerCase()]);if(b)setTool(km[e.key.toLowerCase()],b);}
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  });
  window.addEventListener('resize',function(){render();setTimeout(renderRef,50);});
}

// ═══════════════ PALETTE ═══════════════
function updPal(){
  dmcCache={};
  var el=document.getElementById('pal-grid');el.innerHTML='';
  palette.forEach(function(h,i){
    var s=document.createElement('div');s.className='sw'+(i===SI?' sel':'');
    s.style.background=h;s.title=h;
    s.onclick=function(){SI=i;updPal();};
    s.ondblclick=function(ev){ev.stopPropagation();openColorPicker(i,ev);};
    el.appendChild(s);
  });
  updDMC();
}
function addColor(){palette.push('#888888');dmcCache={};SI=palette.length-1;updPal();openColorPicker(SI,null);}
function removeUnused(){
  var used=new Set();
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c]>=0)used.add(grid[r][c]);
  var np=[],mp={};
  palette.forEach(function(h,i){if(used.has(i)){mp[i]=np.length;np.push(h);}});
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)grid[r][c]=grid[r][c]>=0&&mp[grid[r][c]]!==undefined?mp[grid[r][c]]:-1;
  palette=np;SI=Math.min(SI,palette.length-1);if(SI<0)SI=0;
  dmcCache={};updPal();render();
}
function updDMC(){
  var cnt=new Array(palette.length).fill(0);
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c]>=0)cnt[grid[r][c]]++;
  var used=palette.map(function(h,i){return{h:h,n:cnt[i],i:i};}).filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;});
  var el=document.getElementById('dmc-list');
  if(!used.length){el.innerHTML='<div style="color:var(--muted);padding:4px;font-size:11px">Convert ก่อนนะคะ</div>';return;}
  el.innerHTML='';
  var seen={};
  used.forEach(function(x){
    var d=nearDMC(x.h),key=''+d.num;
    if(seen[key]){seen[key].cnt+=x.n;seen[key].el.querySelector('.dmc-cnt').textContent=seen[key].cnt;return;}
    var row=document.createElement('div');row.className='dmc-row';
    row.innerHTML='<div class="dmc-dot" style="background:'+d.hex+'"></div><span class="dmc-num">'+d.num+'</span><span class="dmc-name">'+d.name+'</span><span class="dmc-cnt">'+x.n+'</span>';
    seen[key]={el:row,cnt:x.n};el.appendChild(row);
  });
}

      showBadge('✓ โหลดสำเร็จ '+imgSrc.naturalWidth+'×'+imgSrc.naturalHeight,'ok');
      detectedBlock=0;

      quickBlockHint();

      refNatW=imgSrc.naturalWidth;refNatH=imgSrc.naturalHeight;

function autoSize(){
  if(!imgSrc){alert('อัปโหลดภาพก่อนค่ะ');return;}
  var hint=document.getElementById('size-hint');
  var sw=imgSrc.naturalWidth,sh=imgSrc.naturalHeight;

  // Draw small version for analysis
  var cap=1400,scl=Math.min(1,cap/Math.max(sw,sh));
  var W=Math.round(sw*scl),H=Math.round(sh*scl);
  var sc=document.createElement('canvas');sc.width=W;sc.height=H;
  var sx=sc.getContext('2d');
  sx.imageSmoothingEnabled=false;
  sx.fillStyle='#fff';sx.fillRect(0,0,W,H);
  sx.drawImage(imgSrc,0,0,W,H);
  var px=sx.getImageData(0,0,W,H).data;

  // Autocorrelation of horizontal gradient
  var y0=Math.floor(H*0.15),y1=Math.floor(H*0.85);
  var grad=new Float32Array(W);
  var n=0;
  for(var y=y0;y<y1;y+=1){
    for(var x=1;x<W;x++){
      var i=(y*W+x)*4,j=i-4;
      grad[x]+=(Math.abs(px[i]-px[j])+Math.abs(px[i+1]-px[j+1])+Math.abs(px[i+2]-px[j+2]))/3;
    }
    n++;
  }
  var mean=0;
  for(var x=0;x<W;x++){grad[x]/=Math.max(1,n);mean+=grad[x];}
  mean/=W;
  for(var x=0;x<W;x++)grad[x]-=mean;

  // Also vertical
  var x0=Math.floor(W*0.15),x1=Math.floor(W*0.85);
  var grady=new Float32Array(H);
  var ny=0;
  for(var x=x0;x<x1;x+=1){
    for(var y=1;y<H;y++){
      var i=(y*W+x)*4,j=i-W*4;
      grady[y]+=(Math.abs(px[i]-px[j])+Math.abs(px[i+1]-px[j+1])+Math.abs(px[i+2]-px[j+2]))/3;
    }
    ny++;
  }
  var meany=0;
  for(var y=0;y<H;y++){grady[y]/=Math.max(1,ny);meany+=grady[y];}
  meany/=H;
  for(var y=0;y<H;y++)grady[y]-=meany;

  // Variance for normalization
  var varH=0,varV=0;
  for(var x=0;x<W;x++)varH+=grad[x]*grad[x];
  for(var y=0;y<H;y++)varV+=grady[y]*grady[y];

  // Compute ACF at each lag, pick best in fw=20..120 range
  var bestLag=10,bestScore=-999,results=[];
  for(var lag=3;lag<=Math.min(100,Math.floor(W/4));lag++){
    var fw=Math.round(sw/(lag/scl));
    if(fw<10||fw>200)continue;
    var acfH=0;
    for(var x=0;x+lag<W;x++)acfH+=grad[x]*grad[x+lag];
    acfH=varH>0?acfH/varH:0;
    var acfV=0;
    for(var y=0;y+lag<H;y++)acfV+=grady[y]*grady[y+lag];
    acfV=varV>0?acfV/varV:0;
    var score=(acfH+acfV)/2;
    results.push({lag:lag,score:score,fw:fw});
  }

  // Pick best within fw 20-120
  var inRange=results.filter(function(r){return r.fw>=20&&r.fw<=120;});
  var pool=inRange.length?inRange:results;
  pool.sort(function(a,b){return b.score-a.score;});

  if(!pool.length||pool[0].score<0.05){
    // Fallback: use image dimensions to guess
    var base=sw>1000?80:sw>500?60:40;
    var fbase=Math.round(base*sh/sw);
    applySz(base,fbase,0);
    hint.innerHTML='🖼 Flat art → '+base+'×'+fbase;hint.style.display='block';
    return;
  }

  var best=pool[0];
  var realBlock=Math.round(best.lag/scl);
  var fw=Math.max(10,Math.min(150,Math.round(sw/realBlock)));
  var fh=Math.max(10,Math.min(150,Math.round(sh/realBlock)));
  // Snap to square if close
  if(Math.abs(fw-fh)/Math.max(fw,fh)<0.07){var avg=Math.round((fw+fh)/2);fw=avg;fh=avg;}
  detectedBlock=realBlock;
  applySz(fw,fh,realBlock);

  var msg='🎮 block='+realBlock+'px → <b>'+fw+'×'+fh+'</b>';
  if(pool.length>1){
    pool.slice(1,3).forEach(function(r){
      var rb=Math.round(r.lag/scl);
      var fw2=Math.max(10,Math.min(150,Math.round(sw/rb)));
      msg+=' <span style="cursor:pointer;text-decoration:underline;color:var(--muted)" onclick="applySz('+fw2+','+fw2+','+rb+')">'+fw2+'×'+fw2+'</span>';
    });
  }
  hint.innerHTML=msg;hint.style.display='block';
}


// ═══════════════ AUTO COLORS ═══════════════
function autoColors(){
  if(!imgSrc){alert('อัปโหลดภาพก่อนค่ะ');return;}
  // Use same pipeline as doConvert to get accurate color count
  var curW=+document.getElementById('sW').value||40;
  var curH=+document.getElementById('sH').value||40;
  var sw=imgSrc.naturalWidth,sh=imgSrc.naturalHeight;
  var cap=1400,scl=Math.min(1,cap/Math.max(sw,sh));
  var W=Math.round(sw*scl),H=Math.round(sh*scl);
  var sc=document.createElement('canvas');sc.width=W;sc.height=H;
  var sx=sc.getContext('2d');
  sx.imageSmoothingEnabled=false;
  sx.fillStyle='#fff';sx.fillRect(0,0,W,H);sx.drawImage(imgSrc,0,0,W,H);
  var px=sx.getImageData(0,0,W,H).data;

  // Check bg mode
  var bgMode=document.getElementById('bgMode').value;
  var corner=sx.getImageData(0,0,4,4).data;
  var cLum=0.299*corner[0]+0.587*corner[1]+0.114*corner[2];
  var isDark=cLum<40;

  var bW=W/curW,bH=H/curH;
  var isPA=detectedBlock>=2||(bW>=2&&bH>=2);

  // Sample each block with dominant color (same as doConvert)
  var umap={};
  for(var r=0;r<curH;r++){
    for(var c=0;c<curW;c++){
      var x0=Math.floor(c*bW),y0=Math.floor(r*bH);
      var x1=Math.max(x0+1,Math.floor((c+1)*bW));
      var y1=Math.max(y0+1,Math.floor((r+1)*bH));
      var rVal,gVal,bVal;
      if(isPA){
        var hist={};
        for(var dy=y0;dy<y1;dy++) for(var dx=x0;dx<x1;dx++){
          var idx=(dy*W+dx)*4;
          var k=((px[idx]>>3)<<10)|((px[idx+1]>>3)<<5)|(px[idx+2]>>3);
          hist[k]=(hist[k]||0)+1;
        }
        var bk=null,bn=0;
        Object.keys(hist).forEach(function(k){if(hist[k]>bn){bn=hist[k];bk=+k;}});
        if(!bk){continue;}
        rVal=(bk>>10)*8+4;gVal=((bk>>5)&31)*8+4;bVal=(bk&31)*8+4;
      } else {
        var tr=0,tg=0,tb=0,n=0;
        for(var dy=y0;dy<y1;dy++) for(var dx=x0;dx<x1;dx++){
          var idx=(dy*W+dx)*4;tr+=px[idx];tg+=px[idx+1];tb+=px[idx+2];n++;
        }
        rVal=Math.round(tr/n);gVal=Math.round(tg/n);bVal=Math.round(tb/n);
      }
      // Skip background
      var lum=0.299*rVal+0.587*gVal+0.114*bVal;
      var sat=Math.max(rVal,gVal,bVal)-Math.min(rVal,gVal,bVal);
      var isBg=false;
      if(bgMode==='black'&&lum<25&&sat<20)isBg=true;
      if(bgMode==='white'&&lum>218&&sat<28)isBg=true;
      if(isBg)continue;
      var snapK=((rVal>>3)<<10)|((gVal>>3)<<5)|(bVal>>3);
      umap[snapK]=(umap[snapK]||0)+1;
    }
  }

  // Group by DMC (same as doConvert PA path)
  var dmcGroups={};
  Object.entries(umap).filter(function(e){return e[1]>=2;}).forEach(function(e){
    var k=+e[0],r2=(k>>10)*8+4,g2=((k>>5)&31)*8+4,b2=(k&31)*8+4;
    var d=nearDMC(r2h(r2,g2,b2));
    if(!dmcGroups[d.num])dmcGroups[d.num]={n:0};
    dmcGroups[d.num].n+=e[1];
  });

  var n2=Object.keys(dmcGroups).length;
  n2=Math.min(35,Math.max(4,n2));
  setNC(n2);
  var h=document.getElementById('color-hint');
  h.innerHTML='🎨 ตรวจพบ <b>'+n2+' DMC</b> สี';h.style.display='block';
}


// ═══════════════ MAIN CONVERT ═══════════════
function doConvert(){
  if(!imgSrc){alert('อัปโหลดภาพก่อนค่ะ');return;}
  var newC=+document.getElementById('sW').value,newR=+document.getElementById('sH').value;
  var maxNC=+document.getElementById('sNC').value;
  var bgMode=document.getElementById('bgMode').value;
  var chkNoise=document.getElementById('chkNoise').checked;
  var keepAll=false;
  var prog=document.getElementById('prog-wrap'),pf=document.getElementById('prog-fill'),pt=document.getElementById('prog-txt');
  prog.style.display='block';pf.style.width='0%';pt.textContent='กำลังเตรียม...';
  showBadge('⏳ กำลังแปลง...','run');
  setTimeout(function(){
    try{
      COLS=newC;ROWS=newR;
      grid=Array.from({length:ROWS},function(){return new Array(COLS).fill(-1);});
      palette=[];SI=0;hist=[];dmcCache={};
      pf.style.width='15%';pt.textContent='อ่านภาพ...';
      // Draw at native (cap 1600)
      var sw=imgSrc.naturalWidth,sh=imgSrc.naturalHeight;
      var cap=1600,scl=Math.min(1,cap/Math.max(sw,sh));
      var W=Math.round(sw*scl),H=Math.round(sh*scl);
      refC.width=W;refC.height=H;
      // White render
      refX.fillStyle='#ffffff';refX.fillRect(0,0,W,H);refX.drawImage(imgSrc,0,0,W,H);
      var srcW=refX.getImageData(0,0,W,H).data;
      // Black render (alpha detection)
      refX.fillStyle='#000000';refX.fillRect(0,0,W,H);refX.drawImage(imgSrc,0,0,W,H);
      var srcB=refX.getImageData(0,0,W,H).data;
      // Detect alpha
      var aCnt=0;
      for(var i=0;i<H*W;i++){var idx=i*4;if(srcW[idx]-srcB[idx]>150&&srcW[idx+1]-srcB[idx+1]>150&&srcW[idx+2]-srcB[idx+2]>150)aCnt++;}
      var hasAlpha=aCnt>H*W*0.005;
      var bW=W/COLS,bH=H/ROWS,isPA=detectedBlock>=2||(bW>=2&&bH>=2);
      pf.style.width='30%';pt.textContent='สุ่มตัวอย่างสี...';
      // Per-block dominant color
      function getDom(col,row,src){
        var x0=Math.floor(col*bW),y0=Math.floor(row*bH),x1=Math.floor((col+1)*bW),y1=Math.floor((row+1)*bH);
        x1=Math.max(x1,x0+1);y1=Math.max(y1,y0+1);
        if(!isPA){
          var tr=0,tg=0,tb=0,ta=0,n=0;
          for(var y=y0;y<y1;y++)for(var x=x0;x<x1;x++){var idx=(y*W+x)*4;tr+=src[idx];tg+=src[idx+1];tb+=src[idx+2];ta+=src[idx+3];n++;}
          return[Math.round(tr/n),Math.round(tg/n),Math.round(tb/n),Math.round(ta/n)];
        }
        var hist={};
        for(var y=y0;y<y1;y++)for(var x=x0;x<x1;x++){
          var idx=(y*W+x)*4,a=src[idx+3];if(a<40)continue;
          var k=((src[idx]>>3)<<10)|((src[idx+1]>>3)<<5)|(src[idx+2]>>3);
          if(!hist[k])hist[k]={r:0,g:0,b:0,a:0,n:0};
          hist[k].r+=src[idx];hist[k].g+=src[idx+1];hist[k].b+=src[idx+2];hist[k].a+=a;hist[k].n++;
        }
        var bk=null,bn=0;Object.keys(hist).forEach(function(k){if(hist[k].n>bn){bn=hist[k].n;bk=k;}});
        if(!bk)return[255,255,255,255];
        var h=hist[bk];return[Math.round(h.r/h.n),Math.round(h.g/h.n),Math.round(h.b/h.n),Math.round(h.a/h.n)];
      }
      // Build pixel grid
      var pg=[],bgMask=[],fg=[];
      for(var r=0;r<ROWS;r++){
        pg.push([]);bgMask.push([]);
        for(var c=0;c<COLS;c++){
          var cw=getDom(c,r,srcW),cb=getDom(c,r,srcB);
          var rW=cw[0],gW=cw[1],bW2=cw[2],bg=false;
          if(hasAlpha){
            var diff=((cw[0]-cb[0])+(cw[1]-cb[1])+(cw[2]-cb[2]))/3;
            var aEst=Math.max(0,Math.min(1,1-diff/255));
            if(aEst<0.2){bg=true;}
            else if(aEst<0.75){var a=aEst;rW=Math.round(Math.max(0,Math.min(255,(rW-(1-a)*255)/a)));gW=Math.round(Math.max(0,Math.min(255,(gW-(1-a)*255)/a)));bW2=Math.round(Math.max(0,Math.min(255,(bW2-(1-a)*255)/a)));}
          } else if(bgMode!=='none'){
            var lum=0.299*rW+0.587*gW+0.114*bW2,sat=Math.max(rW,gW,bW2)-Math.min(rW,gW,bW2);
            if(bgMode==='black'&&lum<25&&sat<20)bg=true;
            if(bgMode==='white'&&lum>218&&sat<28)bg=true;
          }
          pg[r].push([rW,gW,bW2]);bgMask[r].push(bg);
          if(!bg)fg.push([rW,gW,bW2]);
        }
      }
      // Flood fill bg from edges — ONLY for images without alpha AND explicit black bg
      // For JPEG (no alpha, white bg): skip flood fill to avoid removing white parts of subject
      if(!hasAlpha&&bgMode==='black'){
        var vis=Array.from({length:ROWS},function(){return new Array(COLS).fill(false);}),newBg=Array.from({length:ROWS},function(){return new Array(COLS).fill(false);});
        var stk=[];
        function seedEdge(r,c){var p=pg[r][c],lm=0.299*p[0]+0.587*p[1]+0.114*p[2],st=Math.max(p[0],p[1],p[2])-Math.min(p[0],p[1],p[2]);if(lm>210&&st<30&&!vis[r][c]){vis[r][c]=true;stk.push([r,c]);}}
        for(var ei=0;ei<ROWS;ei++){seedEdge(ei,0);seedEdge(ei,COLS-1);}
        for(var ej=0;ej<COLS;ej++){seedEdge(0,ej);seedEdge(ROWS-1,ej);}
        while(stk.length){
          var pos=stk.pop(),pr=pos[0],pc=pos[1];
          if(pr<0||pr>=ROWS||pc<0||pc>=COLS||newBg[pr][pc])continue;
          var p3=pg[pr][pc],lm3=0.299*p3[0]+0.587*p3[1]+0.114*p3[2],st3=Math.max(p3[0],p3[1],p3[2])-Math.min(p3[0],p3[1],p3[2]);
          if(lm3<208||st3>32)continue;
          newBg[pr][pc]=true;
          [[pr-1,pc],[pr+1,pc],[pr,pc-1],[pr,pc+1]].forEach(function(n){if(n[0]>=0&&n[0]<ROWS&&n[1]>=0&&n[1]<COLS&&!vis[n[0]][n[1]]){vis[n[0]][n[1]]=true;stk.push(n);}});
        }
        bgMask=newBg;fg=[];for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(!bgMask[r][c])fg.push(pg[r][c]);
      }
      pf.style.width='55%';pt.textContent='คำนวณสี...';
      // Color quantize
      if(!fg.length){throw new Error('ไม่พบ foreground pixels — ลองเปลี่ยนโหมดพื้นหลัง');}
      var centers;
      if(isPA){
        // Pixel art: map each block color → nearest DMC → group by DMC number
        var umap={};
        fg.forEach(function(px){
          var k=((px[0]>>3)<<10)|((px[1]>>3)<<5)|(px[2]>>3);
          umap[k]=(umap[k]||0)+1;
        });
        // Filter min 2 blocks
        var raw=Object.entries(umap).filter(function(e){return e[1]>=2;})
          .sort(function(a,b){return b[1]-a[1];});
        // Group by DMC number
        var dmcGroups={};
        raw.forEach(function(e){
          var k=+e[0],r2=(k>>10)*8+4,g2=((k>>5)&31)*8+4,b2=(k&31)*8+4;
          var d=nearDMC(r2h(r2,g2,b2));
          if(!dmcGroups[d.num]){dmcGroups[d.num]={hex:d.hex,n:0};}
          dmcGroups[d.num].n+=e[1];
        });
        // Sort by frequency — keep ALL DMC colors found (no maxNC slice)
        // rare colors like pink paw pads must not be cut
        var totalFg=fg.length||1;
        centers=Object.values(dmcGroups)
          .sort(function(a,b){return b.n-a.n;})
          .filter(function(g){return g.n/totalFg>0.0003;})
          .map(function(g){return h2r(g.hex)||[128,128,128];});
      } else {
        centers=kMeans(fg,maxNC);
      }
      palette=centers.map(function(c){return r2h(c[0],c[1],c[2]);});
      pf.style.width='75%';pt.textContent='Map สีลง grid...';
      // Map pixels
      for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
        if(bgMask[r][c]){grid[r][c]=-1;continue;}
        var px2=pg[r][c],best=-1,bd=1e18;
        for(var pi=0;pi<palette.length;pi++){
          var rgb=h2r(palette[pi]);if(!rgb)continue;
          var d=colorDist(px2[0],px2[1],px2[2],rgb[0],rgb[1],rgb[2]);
          if(d<bd){bd=d;best=pi;}
        }
        grid[r][c]=best;
      }
      pf.style.width='88%';pt.textContent='Noise filter...';
      // Noise filter
      if(chkNoise){
        var mb=Array.from({length:ROWS},function(){return new Array(COLS).fill(false);});
        var sx2=Math.floor(COLS/2),sy2=Math.floor(ROWS/2),sd=1e9,sr2=-1,sc2=-1;
        for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(grid[r][c]>=0){var d2=(r-sy2)*(r-sy2)+(c-sx2)*(c-sx2);if(d2<sd){sd=d2;sr2=r;sc2=c;}}}
        if(sr2>=0){
          var bq=[[sr2,sc2]];mb[sr2][sc2]=true;var bi=0;
          while(bi<bq.length){var bp=bq[bi++];[[bp[0]-1,bp[1]],[bp[0]+1,bp[1]],[bp[0],bp[1]-1],[bp[0],bp[1]+1]].forEach(function(n){if(n[0]>=0&&n[0]<ROWS&&n[1]>=0&&n[1]<COLS&&!mb[n[0]][n[1]]&&grid[n[0]][n[1]]>=0){mb[n[0]][n[1]]=true;bq.push(n);}});}
        }
        for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c]>=0&&!mb[r][c])grid[r][c]=-1;
      }
      pf.style.width='95%';pt.textContent='เสร็จแล้ว!';
      removeUnused();updPal();fitZoom();
      setTimeout(function(){
        prog.style.display='none';
        showBadge('✦ '+palette.length+' สี | '+COLS+'×'+ROWS+' stitches','ok');
        // (sNC not auto-updated after convert)
      },300);
    }catch(err){
      prog.style.display='none';showBadge('❌ '+err.message,'err');console.error(err);
    }
  },50);
}

// K-Means
function kMeans(pixels,k){
  if(!pixels.length)return[[128,128,128]];
  k=Math.min(k,pixels.length);
  var samp=pixels.length>2000?sampleArr(pixels,2000):pixels;
  var centers=[samp[Math.floor(Math.random()*samp.length)].slice()];
  while(centers.length<k){
    var dists=samp.map(function(p){var md=1e18;centers.forEach(function(c){var d=colorDist(p[0],p[1],p[2],c[0],c[1],c[2]);if(d<md)md=d;});return md;});
    var sum=dists.reduce(function(a,b){return a+b;},0);if(sum===0){centers.push(samp[0].slice());continue;}
    var rv=Math.random()*sum,acc=0;
    for(var i=0;i<dists.length;i++){acc+=dists[i];if(acc>=rv){centers.push(samp[i].slice());break;}}
    if(centers.length<=k-1)centers.push(samp[samp.length-1].slice());
  }
  var work=pixels.length>3000?sampleArr(pixels,3000):pixels;
  for(var iter=0;iter<20;iter++){
    var sums=centers.map(function(){return[0,0,0,0];});
    work.forEach(function(p){var bi=0,bd=1e18;centers.forEach(function(c,ci){var d=colorDist(p[0],p[1],p[2],c[0],c[1],c[2]);if(d<bd){bd=d;bi=ci;}});sums[bi][0]+=p[0];sums[bi][1]+=p[1];sums[bi][2]+=p[2];sums[bi][3]++;});
    var mv=false;
    for(var ci=0;ci<centers.length;ci++){if(sums[ci][3]>0){var nr=Math.round(sums[ci][0]/sums[ci][3]),ng=Math.round(sums[ci][1]/sums[ci][3]),nb=Math.round(sums[ci][2]/sums[ci][3]);if(nr!==centers[ci][0]||ng!==centers[ci][1]||nb!==centers[ci][2]){centers[ci]=[nr,ng,nb];mv=true;}}}
    if(!mv)break;
  }
  return centers;
}
function sampleArr(arr,n){if(arr.length<=n)return arr;var r=[],s=arr.length/n;for(var i=0;i<n;i++)r.push(arr[Math.floor(i*s)]);return r;}

// ═══════════════ EXPORT ═══════════════
function exportPNG(){
  var sz=14,W=COLS*sz,H=ROWS*sz;
  var ec=document.createElement('canvas');ec.width=W;ec.height=H;
  var ex=ec.getContext('2d');
  ex.fillStyle='#ffffff';ex.fillRect(0,0,W,H);
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
    var ci=grid[r][c];if(ci<0)continue;
    ex.fillStyle=palette[ci];ex.fillRect(c*sz,r*sz,sz,sz);
  }
  ex.strokeStyle='rgba(0,0,0,.12)';ex.lineWidth=.4;
  for(var r2=0;r2<=ROWS;r2++){ex.beginPath();ex.moveTo(0,r2*sz);ex.lineTo(W,r2*sz);ex.stroke();}
  for(var c2=0;c2<=COLS;c2++){ex.beginPath();ex.moveTo(c2*sz,0);ex.lineTo(c2*sz,H);ex.stroke();}
  ex.strokeStyle='rgba(0,0,0,.3)';ex.lineWidth=.8;
  for(var r3=0;r3<=ROWS;r3+=10){ex.beginPath();ex.moveTo(0,r3*sz);ex.lineTo(W,r3*sz);ex.stroke();}
  for(var c3=0;c3<=COLS;c3+=10){ex.beginPath();ex.moveTo(c3*sz,0);ex.lineTo(c3*sz,H);ex.stroke();}
  dl(ec,'pattern.png');
}

      ex.fillStyle=palette[ci];ex.fillRect(px2,py2,sz,sz);

  }
  ex.strokeStyle='rgba(0,0,0,.35)';ex.lineWidth=.9;
  for(var r2=0;r2<=ROWS;r2+=10){ex.beginPath();ex.moveTo(ox,oy+r2*sz);ex.lineTo(ox+COLS*sz,oy+r2*sz);ex.stroke();}
  for(var c2=0;c2<=COLS;c2+=10){ex.beginPath();ex.moveTo(ox+c2*sz,oy);ex.lineTo(ox+c2*sz,oy+ROWS*sz);ex.stroke();}
  var cnt=new Array(palette.length).fill(0);
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c]>=0)cnt[grid[r][c]]++;
  var lY=oy+ROWS*sz+20;
  ex.fillStyle='#333';ex.font='bold 10px sans-serif';ex.textAlign='left';ex.textBaseline='alphabetic';

  palette.forEach(function(h,i){
    if(!cnt[i])return;
    var d=nearDMC(h),col=Math.floor(i/3)*(W/3),row=i%3;
    var lx=ox+col,ly=lY+12+row*20;
    ex.fillStyle=d.hex;ex.fillRect(lx,ly-10,12,12);
    var rgb=h2r(d.hex),lum=rgb?0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2]:128;
    ex.fillStyle=lum>140?'#000':'#fff';ex.font='bold 8px monospace';ex.textAlign='center';ex.textBaseline='middle';
    ex.fillText(getSym(i),lx+6,ly-4);
    ex.fillStyle='#333';ex.font='10px sans-serif';ex.textAlign='left';ex.textBaseline='alphabetic';
    ex.fillText(getSym(i)+' DMC '+d.num+' '+d.name.substring(0,18)+' ('+cnt[i]+')',lx+16,ly);
  });
  dl(ec,'chart.png');
}
function exportFlossList(){
  var cnt=new Array(palette.length).fill(0);
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(grid[r][c]>=0)cnt[grid[r][c]]++;
  var used=palette.map(function(h,i){return{h:h,n:cnt[i],i:i};}).filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;});
  var total=used.reduce(function(s,x){return s+x.n;},0);
  var rH=26,hH=52,W=540,H=hH+used.length*rH+10;
  var ec=document.createElement('canvas');ec.width=W;ec.height=H;
  var ex=ec.getContext('2d');
  ex.fillStyle='#1a1208';ex.fillRect(0,0,W,hH);
  ex.fillStyle='#fff';ex.font='bold 14px serif';ex.textAlign='left';ex.fillText('Floss List — '+COLS+'×'+ROWS,12,22);
  ex.fillStyle='rgba(255,255,255,.5)';ex.font='11px sans-serif';ex.fillText(used.length+' colors required',12,40);
  used.forEach(function(x,idx){
    var y=hH+rH*idx,d=nearDMC(x.h);
    if(idx%2===0){ex.fillStyle='#f5f0e8';ex.fillRect(0,y,W,rH);}
    ex.fillStyle=d.hex;ex.fillRect(10,y+5,14,14);ex.strokeStyle='#ccc';ex.lineWidth=.5;ex.strokeRect(10,y+5,14,14);
    var rgb=h2r(d.hex),lum=rgb?0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2]:128;
    ex.fillStyle=lum>140?'rgba(0,0,0,.6)':'rgba(255,255,255,.85)';
    ex.font='bold 8px monospace';ex.textAlign='center';ex.fillText(getSym(x.i),17,y+15);
    ex.fillStyle='#1a1208';ex.font='11px sans-serif';ex.textAlign='left';
    ex.fillText('DMC '+d.num,30,y+17);
    ex.fillStyle='#555';ex.fillText(d.name.substring(0,22),100,y+17);
    ex.fillStyle='#1a1208';ex.textAlign='right';ex.fillText(x.n,420,y+17);
    ex.fillStyle='#888';ex.fillText((x.n/total*100).toFixed(1)+'%',490,y+17);
    ex.textAlign='left';ex.strokeStyle='#e8e4dc';ex.lineWidth=.3;ex.beginPath();ex.moveTo(0,y+rH);ex.lineTo(W,y+rH);ex.stroke();
  });
  dl(ec,'floss-list.png');
}
function dl(canvas,name){var a=document.createElement('a');a.download=name;a.href=canvas.toDataURL();a.click();}

function exportPatternKeeper(){
  // Pattern Keeper format: high-res PNG with clear grid + symbol legend
  // Optimized for import into Pattern Keeper / MyThreadwork apps
  var sz=20; // pixels per stitch
  var W=COLS*sz, H=ROWS*sz;
  var legRows=Math.ceil(palette.length/2)+2;
  var legH=legRows*22+30;
  var ec=document.createElement('canvas');
  ec.width=W+120; // extra space for row numbers
  ec.height=H+120+legH;
  var ex=ec.getContext('2d');
  
  // White background
  ex.fillStyle='#ffffff';ex.fillRect(0,0,ec.width,ec.height);
  
  // Title
  ex.fillStyle='#1a1208';ex.font='bold 14px serif';ex.textAlign='left';
  ex.fillText('Cross Stitch Pattern  '+COLS+'×'+ROWS+' stitches  '+palette.length+' colors',10,20);
  ex.font='11px sans-serif';ex.fillStyle='#666';
  ex.fillText('Fabric: Aida 14ct  Size: '+(COLS/14*2.54).toFixed(1)+'×'+(ROWS/14*2.54).toFixed(1)+' cm',10,36);
  
  var ox=50, oy=50; // offset for row/col numbers
  
  // Draw stitches
  var cnt=new Array(palette.length).fill(0);
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var ci=grid[r][c];
      var px2=ox+c*sz, py2=oy+r*sz;
      if(ci>=0&&ci<palette.length){
        cnt[ci]++;
        ex.fillStyle=palette[ci];
        ex.fillRect(px2,py2,sz,sz);
        // Symbol
        var rgb2=h2r(palette[ci]);
        var lum2=rgb2?0.299*rgb2[0]+0.587*rgb2[1]+0.114*rgb2[2]:128;
        ex.fillStyle=lum2>140?'rgba(0,0,0,.7)':'rgba(255,255,255,.9)';
        ex.font='bold '+(sz-6)+'px monospace';
        ex.textAlign='center';ex.textBaseline='middle';
        ex.fillText(getSym(ci),px2+sz/2,py2+sz/2);
      }
      // Cell border
      ex.strokeStyle='rgba(0,0,0,.08)';ex.lineWidth=0.5;
      ex.strokeRect(px2,py2,sz,sz);
    }
  }
  
  // Bold 10-grid lines
  ex.strokeStyle='rgba(0,0,0,.35)';ex.lineWidth=1;
  for(var r2=0;r2<=ROWS;r2+=10){
    ex.beginPath();ex.moveTo(ox,oy+r2*sz);ex.lineTo(ox+COLS*sz,oy+r2*sz);ex.stroke();
  }
  for(var c2=0;c2<=COLS;c2+=10){
    ex.beginPath();ex.moveTo(ox+c2*sz,oy);ex.lineTo(ox+c2*sz,oy+ROWS*sz);ex.stroke();
  }
  
  // Row/col numbers every 10
  ex.fillStyle='#888';ex.font='9px sans-serif';ex.textAlign='center';ex.textBaseline='middle';
  for(var c3=0;c3<=COLS;c3+=10){ex.fillText(c3,ox+c3*sz,oy-12);}
  ex.textAlign='right';
  for(var r3=0;r3<=ROWS;r3+=10){ex.fillText(r3,ox-6,oy+r3*sz);}
  
  // Legend
  var lY=oy+ROWS*sz+20;
  ex.fillStyle='#1a1208';ex.font='bold 11px sans-serif';ex.textAlign='left';ex.textBaseline='alphabetic';
  ex.fillText('Thread List:',ox,lY+12);
  lY+=24;
  palette.forEach(function(h,i){
    if(!cnt[i])return;
    var d=nearDMC(h);
    var col=i%2, row2=Math.floor(i/2);
    var lx=ox+col*(W/2+40), ly=lY+row2*22;
    // Color swatch
    ex.fillStyle=d.hex;ex.fillRect(lx,ly,16,16);
    ex.strokeStyle='#999';ex.lineWidth=0.5;ex.strokeRect(lx,ly,16,16);
    var rgb3=h2r(d.hex);var lum3=rgb3?0.299*rgb3[0]+0.587*rgb3[1]+0.114*rgb3[2]:128;
    ex.fillStyle=lum3>140?'rgba(0,0,0,.7)':'rgba(255,255,255,.9)';
    ex.font='bold 9px monospace';ex.textAlign='center';ex.textBaseline='middle';
    ex.fillText(getSym(i),lx+8,ly+8);
    // DMC info
    ex.fillStyle='#222';ex.font='10px sans-serif';ex.textAlign='left';ex.textBaseline='alphabetic';
    ex.fillText('DMC '+d.num+' - '+d.name.substring(0,22)+' ('+cnt[i]+')',lx+20,ly+11);
  });
  
  dl(ec,'pattern-keeper.png');
}

// ── Quick block size hint (runs after image load) ──
function quickBlockHint(){
  if(!imgSrc)return;
  var sw=imgSrc.naturalWidth,sh=imgSrc.naturalHeight;
  // Draw at NATIVE size
  var sc=document.createElement('canvas');
  sc.width=sw;sc.height=sh;
  var sx=sc.getContext('2d');
  sx.imageSmoothingEnabled=false;
  sx.drawImage(imgSrc,0,0,sw,sh);
  var px=sx.getImageData(0,0,sw,sh).data;

  // Sample center row only for speed
  var cy=Math.floor(sh/2);
  var grad=new Float32Array(sw);
  for(var x=1;x<sw;x++){
    var i=(cy*sw+x)*4,j=i-4;
    grad[x]=(Math.abs(px[i]-px[j])+Math.abs(px[i+1]-px[j+1])+Math.abs(px[i+2]-px[j+2]))/3;
  }
  var mean=0;for(var x=0;x<sw;x++)mean+=grad[x];mean/=sw;
  for(var x=0;x<sw;x++)grad[x]-=mean;
  var v0=0;for(var x=0;x<sw;x++)v0+=grad[x]*grad[x];

  // Test blocks 5-30
  var best=10,bestACF=0;
  for(var b=5;b<=30;b++){
    var fw=Math.round(sw/b);
    if(fw<20||fw>150)continue;
    var acf=0;
    for(var x=0;x+b<sw;x++)acf+=grad[x]*grad[x+b];
    acf=v0>0?acf/v0:0;
    if(acf>bestACF){bestACF=acf;best=b;}
  }
  // Show in Block px input as placeholder
  var inp=document.getElementById('manualBlock');
  if(inp){
    inp.placeholder='แนะนำ: '+best;
    inp.value=best;
  }
  // แค่แสดง hint — ไม่ auto apply (user ต้องกด Auto ขนาด หรือ Apply เอง)
  var fw=Math.max(10,Math.min(150,Math.round(sw/best)));
  var fh=Math.max(10,Math.min(150,Math.round(sh/best)));
  if(Math.abs(fw-fh)/Math.max(fw,fh)<0.07){var avg=Math.round((fw+fh)/2);fw=avg;fh=avg;}
  var inp=document.getElementById('manualBlock');
  if(inp){inp.value=best;}
  var hint=document.getElementById('size-hint');
  hint.innerHTML='📐 ตรวจพบ block≈'+best+'px → กด <b>Apply</b> เพื่อตั้ง '+fw+'×'+fh;
  hint.style.display='block';
}

// ═══════════════ BOOT ═══════════════
function boot(){
  gc=document.getElementById('gc');ctx=gc.getContext('2d');
  area=document.getElementById('canvas-area');
  refC=document.getElementById('ref-canvas');refX=refC.getContext('2d');
  grid=Array.from({length:ROWS},function(){return new Array(COLS).fill(-1);});
  initEvents();updStatus();updPal();
  setTimeout(fitZoom,100);

  // Reference panel setup
  refCV=document.getElementById('ref-cv');
  refCTX=refCV?refCV.getContext('2d'):null;

}

// ─── Reference Panel Functions (global) ───
function renderRef(){
  if(!imgSrc||!refCTX)return;
  var wrap=document.getElementById('ref-wrap');
  var dw=wrap.offsetWidth||260,dh=wrap.offsetHeight||400;
  if(dw<10||dh<10)return;
  refCV.width=dw;refCV.height=dh;
  refCV.style.width=dw+'px';refCV.style.height=dh+'px';
  refCTX.fillStyle='#e8e4dc';refCTX.fillRect(0,0,dw,dh);
  if(!refNatW)return;
  var visW=dw/refZL,visH=dh/refZL;
  var sx=Math.max(0,Math.min(refNatW-visW,refVX));
  var sy=Math.max(0,Math.min(refNatH-visH,refVY));
  refCTX.imageSmoothingEnabled=(refZL<1);
  refCTX.drawImage(imgSrc,sx,sy,visW,visH,0,0,dw,dh);
}

window.toggleRef=function(){
  var p=document.getElementById('ref-panel');
  var t=document.getElementById('ref-toggle');
  p.style.display=p.style.display==='none'?'block':'none';
  t.textContent=p.style.display==='none'?'▶':'▼';
};
window.refZoom=function(f){
  refZL=Math.max(0.5,Math.min(20,refZL*f));renderRef();
};
window.refFit=function(){refZL=1;refVX=0;refVY=0;renderRef();};

window.toggleRefPick=function(){
  refPicking=!refPicking;
  var btn=document.getElementById('ref-pick-btn');
  var cv=document.getElementById('ref-cv');
  if(refPicking){btn.classList.add('active');cv.classList.add('ref-picking');}
  else{btn.classList.remove('active');cv.classList.remove('ref-picking');}
};

if(refCV){
  // Pan
  var refDrag=false,refDragSt=null;
  refCV.addEventListener('mousedown',function(e){
    if(refPicking){
      // Pick color from reference image
      var rc=refCV.getBoundingClientRect();
      var px=(e.clientX-rc.left)/refZL+refVX;
      var py=(e.clientY-rc.top)*refNatH/refCV.height/refZL+refVY;
      px=Math.max(0,Math.min(refNatW-1,Math.round(px)));
      py=Math.max(0,Math.min(refNatH-1,Math.round(py)));
      // Get pixel color from source
      var pc=document.createElement('canvas');pc.width=1;pc.height=1;
      var px2=pc.getContext('2d');
      px2.drawImage(imgSrc,px,py,1,1,0,0,1,1);
      var id=px2.getImageData(0,0,1,1).data;
      var hex=r2h(id[0],id[1],id[2]);
      // Add to palette if not exists
      var d=nearDMC(hex);
      var dmcHex=d.hex;
      if(palette.indexOf(dmcHex)<0){palette.push(dmcHex);dmcCache={};}
      SI=palette.indexOf(dmcHex);
      updPal();
      // Show preview
      var prev=document.getElementById('ref-color-preview');
      var dot=document.getElementById('ref-color-dot');
      var txt=document.getElementById('ref-color-txt');
      prev.style.display='flex';
      dot.style.background=dmcHex;
      txt.textContent='DMC '+d.num+' '+d.name;
      // Auto switch to paint tool
      var pbtn=document.getElementById('t-paint');
      if(pbtn)setTool('paint',pbtn);
    } else {
      refDrag=true;
      refDragSt={x:e.clientX,y:e.clientY,vx:refVX,vy:refVY};
    }
  });
  refCV.addEventListener('mousemove',function(e){
    if(refDrag&&refDragSt){
      var dxPx=(e.clientX-refDragSt.x)/refZL;
      var dyPx=(e.clientY-refDragSt.y)*refNatH/refCV.height/refZL;
      refVX=Math.max(0,refDragSt.vx-dxPx);
      refVY=Math.max(0,refDragSt.vy-dyPx);
      renderRef();
    }
    if(refPicking){
      // Show color under cursor
      var rc=refCV.getBoundingClientRect();
      var px=Math.round((e.clientX-rc.left)/refZL+refVX);
      var py=Math.round((e.clientY-rc.top)*refNatH/refCV.height/refZL+refVY);
      px=Math.max(0,Math.min(refNatW-1,px));
      py=Math.max(0,Math.min(refNatH-1,py));
      var pc=document.createElement('canvas');pc.width=1;pc.height=1;
      var px2=pc.getContext('2d');
      px2.drawImage(imgSrc,px,py,1,1,0,0,1,1);
      var id=px2.getImageData(0,0,1,1).data;
      var hex=r2h(id[0],id[1],id[2]);
      var d=nearDMC(hex);
      var dot=document.getElementById('ref-color-dot');
      var txt=document.getElementById('ref-color-txt');
      var prev=document.getElementById('ref-color-preview');
      prev.style.display='flex';
      dot.style.background=d.hex;
      txt.textContent='DMC '+d.num+' '+d.name;
    }
  });
  refCV.addEventListener('mouseup',function(){refDrag=false;});
  refCV.addEventListener('wheel',function(e){
    e.preventDefault();
    refZL=Math.max(0.5,Math.min(20,refZL*(e.deltaY<0?1.2:1/1.2)));
    renderRef();
  },{passive:false});
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
else setTimeout(boot,0);
